<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=overlays-content" />
    <meta name="description" content="SEC Nightlife — Your Night. Simplified. Discover events, book tables, and connect with the nightlife scene." />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SEC" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preload" as="image" href="/Logo/sec-email-logo-transparent.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />
    <title>SEC Nightlife</title>
    <style>
      #sec-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #sec-boot-splash.sec-boot-splash--out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #sec-boot-splash img { height: 88px; width: auto; object-fit: contain; }
      #sec-boot-splash .sec-boot-title {
        margin: 18px 0 8px;
        font: 700 26px/1 Inter, system-ui, sans-serif;
        letter-spacing: 0.22em;
        color: #f5f5f5;
      }
      #sec-boot-splash .sec-boot-tagline {
        margin: 0 0 26px;
        font: 600 11px/1 Inter, system-ui, sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #6b6b6b;
      }
      #sec-boot-splash .sec-boot-track {
        width: 120px;
        height: 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      #sec-boot-splash .sec-boot-bar {
        width: 45%;
        height: 100%;
        background: linear-gradient(135deg, #a8a8a8, #d8d8d8, #a0a0a0);
        animation: sec-boot-shimmer 1.35s ease-in-out infinite;
      }
      @keyframes sec-boot-shimmer {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(280%); }
      }
    </style>
  </head>
  <body style="margin:0;background:#000000">
    <script>
      (function(){document.documentElement.classList.remove('light','dark');document.documentElement.classList.add('dark');document.documentElement.style.colorScheme='dark';})();
    </script>
    <div id="sec-boot-splash" aria-label="Loading SEC Nightlife">
      <img src="/Logo/sec-email-logo-transparent.png" alt="SEC" width="120" height="88" />
      <div class="sec-boot-title">SEC</div>
      <p class="sec-boot-tagline">Your Night. Simplified.</p>
      <div class="sec-boot-track"><div class="sec-boot-bar"></div></div>
    </div>
    <div id="root"></div>
    <script>
      setTimeout(function () {
        var el = document.getElementById('sec-boot-splash');
        if (el) el.remove();
      }, 6000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
